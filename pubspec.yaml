name: lecture_vault
description: 上課錄音即時轉文字與重點萃取
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  archive: ^3.6.1
  file_picker: ^8.1.2
  characters: ^1.4.0
  dart_sentencepiece_tokenizer: ^1.3.2
  extension_google_sign_in_as_googleapis_auth: ^2.0.13
  google_fonts: ^6.2.1
  google_sign_in: ^6.3.0
  googleapis: ^14.0.0
  http: ^1.2.2
  flutter_riverpod: ^3.3.1
  onnxruntime: ^1.4.1
  path: ^1.9.0
  path_provider: ^2.1.2
  record: ^5.1.0
  sqflite: ^2.3.0
  whisper_ggml_plus: ^1.5.2
  audioplayers: ^5.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  sqflite_common_ffi: ^2.3.0+1

flutter:
  uses-material-design: true
  assets:
    - assets/models/whisper/ggml-tiny.bin
    - assets/models/whisper/ggml-tiny.en.bin
    - assets/models/whisper/ggml-base.bin
    - assets/models/whisper/ggml-base.en.bin
    - assets/models/whisper/ggml-small.bin
    - assets/models/whisper/ggml-medium.bin
    - assets/models/minilm/
    - assets/audio/test.wav

dependency_overrides:
  record_linux: ^1.3.0
