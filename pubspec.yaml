name: lecture_vault
description: 上課錄音即時轉文字與重點萃取
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  record: ^5.1.0
  path_provider: ^2.1.2
  path: ^1.9.0
  sqflite: ^2.3.0
  sherpa_onnx: ^1.12.0
  audioplayers: ^5.2.1
  flutter_open_chinese_convert: ^0.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  sqflite_common_ffi: ^2.3.0+1

flutter:
  uses-material-design: true
  assets:
    - assets/models/stt/model.int8.onnx
    - assets/models/stt/tokens.txt
    - assets/models/minilm/model.onnx
    - assets/models/minilm/vocab.txt
    - assets/audio/test.wav

dependency_overrides:
  record_linux: ^1.3.0
  sqlite3: 2.4.6