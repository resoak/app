name: lecture_vault
description: 上課錄音即時轉文字與重點萃取

publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  record: ^6.0.0
  sherpa_onnx: ^1.10.9
  onnxruntime: ^1.4.1
  sqflite: ^2.3.3
  path_provider: ^2.1.3
  path: ^1.9.0
  flutter_markdown: ^0.7.3
  intl: ^0.19.0
  share_plus: ^10.0.0
  permission_handler: ^11.3.1
  ffi: ^2.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  sqflite_common_ffi: ^2.3.0

flutter:
  uses-material-design: true
  assets:
    - assets/models/minilm/
    - assets/models/stt/